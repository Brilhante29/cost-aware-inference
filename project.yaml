id: 30
name: cost-aware-inference
program:
  id: ai-evaluation-retrieval
  narrative_fit: Closes the platform loop with measured provider usage and explicit cost assumptions.
  shared_assets:
    - benchmark request fixture
    - provider port
    - portfolio-compatible result JSON
    - per-provider sample contract
status: benchmarked
claim: Executes a deterministic local inference baseline, measures observed latency and token usage, and estimates cost from separately configured prices; external HTTP comparison is optional.
stack:
  - python
  - ports-and-adapters
  - openai-compatible-http
  - json
  - docker
language_profile:
  primary: python
  secondary: []
  reason: Standard-library Python keeps the offline benchmark deterministic while exposing testable provider boundaries.
decision_brain:
  agent_graph:
    mode: principal-agent-orchestrated
    source: .portfolio/decision-brain/agent-graph.yaml
    handoff: sdd/agent-handoff.md
    local_first_runtime: docker
  reuse_improvement_loop:
    source: .portfolio/decision-brain/reuse-improvement-loop.yaml
    review_path: sdd/reuse-improvement-review.md
    current_status: backlog_recorded
  principles:
    coupling_rule: Application orchestration depends on the InferenceProvider protocol, never concrete HTTP infrastructure.
    solid: [srp, ocp, lsp, isp, dip]
    simplicity_rule: Keep one honest local baseline and one optional standard HTTP boundary.
    testability_rule: Network transport and clock are injectable; the default suite is offline.
  stack_profile: python
  api_style: cli-first
  messaging: none
  cloud:
    mode: local-first
    local_provider: deterministic-extractive
    real_provider_target: openai-compatible-http
    adapter_rule: Endpoint, model, prices, and optional key come only from environment variables.
  database: fixture-and-pricing-files
  runtime: python-cli
  library_policy: Standard library only; provider SDKs are unnecessary for the HTTP contract.
  record_path: sdd/technical-decision.md
architecture:
  style: hexagonal
  reason: Provider execution and pricing sources vary independently while benchmark policy stays stable.
  dependency_rule: Adapters implement the provider port; domain and application never import adapters.
design_system:
  tokens: .portfolio/design-system/tokens.yaml
  readme_components: [readme_header, benchmark_card, architecture_card, references_table]
  diagram_required: true
reuse:
  kit_version: local
  uses: [catalog, programs, decision-brain, reuse-improvement-loop, architecture, language-profiles, design-system, sdd, harness, templates, skills]
benchmark:
  primary_metric: observed_p95_latency_ms
  unit: ms
  command: python -m cost_aware_inference benchmark --providers local --repeat 5 --output benchmarks/results/cost-aware-baseline.json
  result_path: benchmarks/results/cost-aware-baseline.json
release:
  docker: Dockerfile
  no_secret_default_path: true
  readme_has_number: true
  references_documented: true
